<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>" />
    <title>R1 Painter</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e12;
                   font: 13px/1.45 system-ui, sans-serif; color: #cdd6e0; }
      #app { display: flex; height: 100%; }
      #viewport { flex: 1; position: relative; min-width: 0; }
      #viewport canvas { display: block; }
      #panel { width: 320px; padding: 12px; box-sizing: border-box; overflow-y: auto;
               background: #12161c; border-left: 1px solid #232a33; }
      #panel h1 { font-size: 14px; margin: 0 0 4px; color: #e8eef4; }
      #panel .hint { color: #7d8794; font-size: 11.5px; margin-bottom: 10px; }
      .part { display: flex; align-items: center; gap: 8px; padding: 4px 6px;
              border-radius: 6px; }
      .part.selected { background: #1d2733; outline: 1px solid #3d6ca0; }
      .part input[type="color"] { width: 30px; height: 24px; border: none;
              background: none; padding: 0; cursor: pointer; }
      .part .name { flex: 1; text-transform: capitalize; }
      .part select { background: #1a212b; color: #cdd6e0; border: 1px solid #2b3542;
              border-radius: 4px; font: inherit; font-size: 11px; }
      .part input[type="checkbox"] { accent-color: #3d6ca0; }
      .row { display: flex; gap: 6px; margin-top: 12px; }
      .row button { flex: 1; background: #1a212b; color: #cdd6e0;
              border: 1px solid #2b3542; border-radius: 6px; padding: 6px 8px;
              font: inherit; cursor: pointer; }
      .row button:hover { background: #222b37; }
      #overlay { position: absolute; inset: 0; display: flex; align-items: center;
                 justify-content: center; background: #0b0e12; z-index: 10; }
      #overlay.hidden { display: none; }
      a { color: #6fa8dc; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewport">
        <div id="overlay"><div id="overlay-msg">loading…</div></div>
      </div>
      <div id="panel">
        <h1>R1 Painter</h1>
        <div class="hint">Click a part on the robot or in the list. Colors save
          automatically and apply live in the <a href="/" target="_blank">sim</a>
          (eye = hidden).</div>
        <div id="parts"></div>
        <div class="row">
          <button id="reset">Reset to default</button>
          <button id="copy">Copy JSON</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/painter.ts"></script>
  </body>
</html>
